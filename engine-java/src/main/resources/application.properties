# ---------------------------------------------------------------------------
# quarkrag — defaults run the entire engine with no external services.
# ---------------------------------------------------------------------------

quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*

# memory | pgvector
quarkrag.store=memory

# extractive | openai
quarkrag.llm=extractive

quarkrag.embedding.dim=256
quarkrag.chunk.max-words=120

# --- Postgres + pgvector (only read when quarkrag.store=pgvector) -----------
# quarkrag.pg.url=jdbc:postgresql://localhost:5432/quarkrag
# quarkrag.pg.user=postgres
# quarkrag.pg.password=postgres

# --- OpenAI (only read when quarkrag.llm=openai) ---------------------------
# quarkrag.openai.api-key=${OPENAI_API_KEY}
# quarkrag.openai.model=gpt-4o-mini
# quarkrag.openai.base-url=https://api.openai.com/v1

quarkus.log.category."com.quarkrag".level=INFO

# --- Native image ----------------------------------------------------------
# The Postgres driver is only reachable at runtime under the pgvector profile,
# so it is registered explicitly for reflection in native builds.
quarkus.native.additional-build-args=--initialize-at-run-time=org.postgresql.Driver
