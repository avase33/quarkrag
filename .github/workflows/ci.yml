name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: build + test engine
        working-directory: engine-java
        run: mvn -B verify

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: build chat UI
        working-directory: chat-ts
        run: |
          npm install
          npm run build
